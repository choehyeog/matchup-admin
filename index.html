<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>매치업(Match-up) 관리 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .table-img { width: 45px; height: 45px; object-fit: cover; border-radius: 4px; }
        /* 토글 스위치 스타일 */
        .form-check-input { cursor: pointer; width: 3em; height: 1.5em; }
        .page-link { color: #333; }
        .active > .page-link { background-color: #333; border-color: #333; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid"><span class="navbar-brand">Match-up Admin</span></div>
</nav>

<div class="container">
    <div class="card shadow-sm">
        <div class="card-header bg-white"><strong>상품 매칭 관리</strong></div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>상품코드</th>
                        <th>제품사진</th>
                        <th>상품명</th>
                        <th>서비스 활성화</th>
                        <th class="text-center">매칭관리</th>
                    </tr>
                </thead>
                <tbody id="productBody"></tbody>
            </table>
        </div>
        <div class="card-footer bg-white d-flex justify-content-center">
            <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
        </div>
    </div>
</div>

<div class="modal fade" id="matchModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">매칭 데이터 설정</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p id="modalPName" class="fw-bold text-primary"></p>
                <form id="matchForm">
                    <input type="hidden" id="modalPCode">
                    <div class="mb-3">
                        <label class="form-label">발볼 난이도</label>
                        <select class="form-select" id="widthLevel">
                            <option value="narrow">좁음 (Narrow)</option>
                            <option value="normal" selected>보통 (Normal)</option>
                            <option value="wide">넓음 (Wide)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">사이즈 추천 문구</label>
                        <textarea class="form-control" id="matchNote" rows="3" placeholder="예: 정사이즈보다 5mm 크게 주문하세요."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                <button type="button" class="btn btn-primary" onclick="saveMatchSettings()">설정 저장</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let currPage = 1;
    const matchModal = new bootstrap.Modal(document.getElementById('matchModal'));

    async function load(page) {
        currPage = page;
        const res = await fetch(`/api/products?page=${page}&limit=20`);
        const data = await res.json();
        render(data.products, (page-1)*20);
        renderPager(data.pagination);
    }

    function render(products, offset) {
        const html = products.map((p, i) => `
            <tr>
                <td>${offset + i + 1}</td>
                <td class="text-muted small">${p.product_code}</td>
                <td><img src="${p.tiny_image}" class="table-img"></td>
                <td>${p.product_name}</td>
                <td>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" ${p.display === 'T' ? 'checked' : ''} 
                               onclick="toggleService('${p.product_code}', this.checked)">
                    </div>
                </td>
                <td class="text-center">
                    <button class="btn btn-dark btn-sm" onclick="openModal('${p.product_code}', '${p.product_name}')">매칭설정</button>
                </td>
            </tr>
        `).join('');
        $('#productBody').html(html);
    }

    function renderPager(pg) {
        let h = `<li class="page-item ${currPage===1?'disabled':''}"><a class="page-link" onclick="load(${currPage-1})">&lt;</a></li>`;
        h += `<li class="page-item active"><a class="page-link">${currPage}</a></li>`;
        if(pg.hasNextPage) h += `<li class="page-item"><a class="page-link" onclick="load(${currPage+1})">${currPage+1}</a></li>`;
        h += `<li class="page-item ${!pg.hasNextPage?'disabled':''}"><a class="page-link" onclick="load(${currPage+1})">&gt;</a></li>`;
        $('#pagination').html(h);
    }

    // 서비스 활성화 토글 함수
    function toggleService(pCode, isChecked) {
        console.log(`서비스 상태 변경: ${pCode} -> ${isChecked ? 'ON' : 'OFF'}`);
        // 여기에 나중에 매치업 서버로 상태를 보내는 fetch 코드를 넣습니다.
    }

    // 모달 열기
    function openModal(pCode, pName) {
        $('#modalPName').text(pName);
        $('#modalPCode').val(pCode);
        matchModal.show();
    }

    // [중요] 매치업 서버와 연동하여 설정 저장
    async function saveMatchSettings() {
        const pCode = $('#modalPCode').val();
        const width = $('#widthLevel').val();
        const note = $('#matchNote').val();

        alert(`${pCode} 상품의 매칭 데이터를 저장합니다.\n발볼: ${width}\n메모: ${note}`);

        /* // 실제 매치업 서버(또는 DB) 연동 코드 예시
        const res = await fetch('/api/save-match', {
            method: 'POST',
            body: JSON.stringify({ pCode, width, note })
        });
        */
        matchModal.hide();
    }

    $(document).ready(() => load(1));
</script>
</body>
</html>
