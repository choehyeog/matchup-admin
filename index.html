<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>매치업 - 상품 관리</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f5f7fa; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .product-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; }
        .product-name { font-size: 1.1rem; font-weight: bold; margin-bottom: 8px; color: #333; }
        .product-price { color: #0070f3; font-weight: 600; margin-bottom: 15px; }
        .btn-match { width: 100%; padding: 10px; background: #0070f3; color: white; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-match:hover { background: #0051ad; }
        .loading { text-align: center; font-size: 1.2rem; color: #666; padding: 50px; }
    </style>
</head>
<body>

<div class="header">
    <h1>👟 매치업 상품 목록</h1>
    <p id="mall-id">Mall: myfootsize</p>
</div>

<div id="loading" class="loading">상품 데이터를 불러오는 중...</div>
<div class="product-grid" id="product-list"></div>

<script>
    async function loadProducts() {
        try {
            // 우리가 만든 API 경로에서 데이터를 가져옵니다.
            const response = await fetch('/api/products');
            const data = await response.json();

            const productList = document.getElementById('product-list');
            const loading = document.getElementById('loading');
            loading.style.display = 'none';

            // 상품 목록을 화면에 하나씩 그립니다.
            data.products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.list_image}" class="product-img" alt="${product.product_name}">
                    <div class="product-name">${product.product_name}</div>
                    <div class="product-price">${Number(product.price).toLocaleString()}원</div>
                    <button class="btn-match" onclick="alert('${product.product_name} 매칭 설정을 시작합니다!')">
                        매칭 설정하기
                    </button>
                `;
                productList.appendChild(card);
            });
        } catch (error) {
            console.error('데이터 로드 실패:', error);
            document.getElementById('loading').innerText = '데이터를 불러오지 못했습니다. 토큰 만료를 확인하세요.';
        }
    }

    loadProducts();
</script>

</body>
</html>
