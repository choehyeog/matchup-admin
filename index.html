<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>매치업(Match-Up) 관리자 패널</title>

  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700|Nunito:300,400,600,700" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

  <style>
    body { font-family: "Nunito", sans-serif; background: #f6f9ff; color: #444; }
    .header { height: 60px; background: #fff; border-bottom: 1px solid #ebeef1; position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; padding: 0 20px; }
    .logo span { font-size: 20px; font-weight: 700; color: #012970; }
    .sidebar { position: fixed; top: 60px; left: 0; bottom: 0; width: 260px; background: #fff; border-right: 1px solid #ebeef1; padding: 20px; z-index: 996; }
    .main { margin-top: 60px; margin-left: 260px; padding: 20px; transition: all 0.3s; }
    
    @media (max-width: 991px) { .sidebar { left: -260px; } .main { margin-left: 0; } }

    .card { border: none; border-radius: 5px; box-shadow: 0px 0 30px rgba(1, 41, 112, 0.1); }
    .product-img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; }
    .form-check-input { width: 45px !important; height: 22px !important; cursor: pointer; }
    
    /* 모달 디자인 커스텀 (이미지 레이아웃 반영) */
    .modal-content { border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .modal-header { border-bottom: 1px solid #f0f0f0; padding: 20px; position: relative; }
    .modal-title { font-weight: 700; color: #333; }
    .modal-product-badge { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #eee; margin-left: 15px; }
    .modal-body { padding: 30px; }
    .form-label { font-weight: 600; color: #666; font-size: 13px; margin-bottom: 5px; }
    .form-control, .form-select { border-radius: 8px; border: 1px solid #e0e0e0; padding: 10px; font-size: 14px; }
    .form-control:focus { border-color: #0d6efd; box-shadow: none; }
    .bg-light-input { background-color: #f8f9fa !important; }
    
    /* 버튼 스타일 */
    .btn-save { background-color: #0d6efd; border: none; padding: 10px 40px; border-radius: 8px; font-weight: 600; }
    .btn-dark-custom { background-color: #212529; border: none; color: white; padding: 8px 15px; border-radius: 6px; font-size: 14px; }
    .btn-last-gen { background-color: #0d6efd; border: none; border-radius: 8px; width: 100%; height: 100%; }
  </style>
</head>

<body>

  <header id="header" class="header d-flex align-items-center shadow-sm">
    <div class="logo"><span>MATCH-UP <i class='ri-star-fill' style='color: #ffc107;'></i></span></div>
    <div class="ms-auto pe-3"><small class="text-muted">choi@myfootsize.com</small></div>
  </header>

  <aside id="sidebar" class="sidebar">
    <ul class="nav flex-column">
      <li class="nav-item mb-2"><a class="nav-link bg-primary text-white rounded" href="#"><i class="bi bi-grid me-2"></i>매칭 상품 관리</a></li>
      <li class="nav-item mb-2"><a class="nav-link text-dark" href="#"><i class="bi bi-journal-text me-2"></i>측정 리포트</a></li>
    </ul>
  </aside>

  <main id="main" class="main">
    <div class="pagetitle mb-4"><h1>매칭 상품 관리</h1></div>
    <section class="section">
      <div class="card">
        <div class="card-body pt-3">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div>Total : <span id="id_total_count" class="badge bg-primary">0</span></div>
            <div class="input-group w-25">
              <input type="text" class="form-control" placeholder="상품명 검색">
              <button class="btn btn-dark"><i class="bi bi-search"></i></button>
            </div>
          </div>
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>상품코드</th>
                  <th>제품사진</th>
                  <th>상품명</th>
                  <th class="text-center">서비스 활성화</th>
                  <th class="text-center">매칭 관리</th>
                </tr>
              </thead>
              <tbody id="product-list-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="modal fade" id="id_dlg_lable" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header d-flex align-items-center">
          <h5 class="modal-title m-0">매칭설정</h5>
          <img id="modal_product_img" src="" class="modal-product-badge" alt="상품사진">
          <button type="button" class="btn-close ms-auto" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="productLable">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">상품코드</label>
                <input type="text" name="shoe_seq" class="form-control bg-light-input" readonly>
              </div>
              <div class="col-md-6">
                <label class="form-label">상품명</label>
                <input type="text" name="gs_name" class="form-control bg-light-input" readonly>
              </div>
              <div class="col-md-6">
                <label class="form-label">측정 종이 사이즈</label>
                <select class="form-select" name="ref_obj">
                  <option value="A4">A4</option>
                  <option value="LETTER">LETTER</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">하이힐 여부</label>
                <select class="form-select" name="high_heel">
                  <option value="N">N</option>
                  <option value="Y">Y</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">사이즈 시스템</label>
                <select class="form-select" name="grading_system">
                  <option value="MONDO">MONDO (KR/JP)</option>
                  <option value="EUR">EUR</option>
                  <option value="UK">UK</option>
                  <option value="USM">US (Men)</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">측정하는 상품의 사이즈</label>
                <input type="text" name="shoe_size_input" class="form-control" placeholder="270.00">
              </div>
              <div class="col-md-6">
                <label class="form-label">갑피재질</label>
                <select class="form-select" name="shoe_upper_correct">
                  <option value="3">Fabric (천)</option>
                  <option value="5">Leather (가죽)</option>
                  <option value="6">Padding (패딩)</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">기본 피팅 설정</label>
                <select class="form-select" name="shoe_fitting_correct">
                  <option value="5">보통 (운동화)</option>
                  <option value="7">타이트함 (구두)</option>
                </select>
              </div>
            </div>

            <div class="text-center my-4 pt-2">
              <button type="button" class="btn btn-primary btn-save px-5">Save</button>
            </div>

            <div class="d-flex justify-content-center gap-2 mb-4">
              <button type="button" class="btn btn-dark-custom">라벨링</button>
              <button type="button" class="btn btn-dark-custom">너비옵션</button>
              <button type="button" class="btn btn-dark-custom">제조사이즈</button>
            </div>

            <div class="border-top pt-4 mt-2 row g-2 align-items-center">
              <div class="col-md-2"><span class="small fw-bold text-muted">라스트 이름</span></div>
              <div class="col-md-2"><input type="text" class="form-control bg-light-input text-center" value="0" readonly></div>
              <div class="col-md-5"><input type="text" name="last_name" class="form-control" placeholder="라스트명 입력"></div>
              <div class="col-md-3"><button type="button" class="btn btn-primary btn-last-gen">라스트 생성</button></div>
            </div>
          </form>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-secondary px-4" style="border-radius: 8px;" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // 1. 카페24 연동 API 호출 (실제 연동을 위해 어제 만든 경로를 사용하세요)
    async function loadRealProducts() {
      try {
        const response = await fetch('/api/products?page=1&limit=20');
        const data = await response.json();
        renderProducts(data.products);
      } catch (e) {
        console.error("데이터 로드 실패", e);
      }
    }

    // 2. 리스트 화면 출력 (실제 데이터 p.product_code 사용)
    function renderProducts(products) {
      const tbody = document.getElementById('product-list-body');
      tbody.innerHTML = products.map(p => `
        <tr>
          <td><strong>${p.product_code}</strong></td>
          <td><img src="${p.tiny_image}" class="product-img"></td>
          <td>${p.product_name}</td>
          <td class="text-center">
            <div class="form-check form-switch d-inline-block">
              <input class="form-check-input" type="checkbox" ${p.display === 'T' ? 'checked' : ''} onchange="checkStatus(this)">
            </div>
          </td>
          <td class="text-center">
            <button class="btn btn-outline-primary btn-sm" onclick="openMatchingModal('${p.product_code}', '${p.product_name}', '${p.list_image}')">
              <i class="bi bi-ruler"></i> 매칭 설정
            </button>
          </td>
        </tr>
      `).join('');
      document.getElementById('id_total_count').innerText = products.length;
    }

    function checkStatus(el) {
      if (el.checked) {
        alert("데이터 확인이 필요합니다.");
        el.checked = false;
      }
    }
// [수정된 함수] 모달 열기 및 데이터 바인딩
function openMatchingModal(code, name, img) {
  const modalEl = document.getElementById('id_dlg_lable');
  const form = document.getElementById('productLable');
  
  // [수정] "M-" + code 대신 code만 넣어서 순수한 상품코드가 나오게 했습니다.
  form.querySelector('[name="shoe_seq"]').value = code; 
  form.querySelector('[name="gs_name"]').value = name;
  
  // [수정] 이미지가 없을 경우를 대비해 기본 이미지를 처리합니다.
  const modalImg = document.getElementById('modal_product_img');
  modalImg.src = img || 'https://via.placeholder.com/60?text=No+Img'; 
  
  const modal = new bootstrap.Modal(modalEl);
  modal.show();
}
   
    }

    window.onload = loadRealProducts;
  </script>
</body>
</html>
