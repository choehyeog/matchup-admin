<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>매치업 관리자 페이지</title>
    <style>
        /* 초기 스타일: 깔끔한 화이트와 그레이 톤 */
        body { font-family: sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 20px; background-color: #fff; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; font-size: 24px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f8f8; font-weight: bold; }
        
        .product-img { width: 50px; height: 50px; object-fit: cover; border: 1px solid #eee; }
        .btn-setup { padding: 6px 12px; cursor: pointer; background: #fff; border: 1px solid #333; }
        .btn-setup:hover { background: #333; color: #fff; }
        
        #status { margin-bottom: 10px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <h1>매치업(Match-up) 상품 관리</h1>
    <div id="status">쇼핑몰 데이터 연결됨: myfootsize</div>

    <table>
        <thead>
            <tr>
                <th>번호</th>
                <th>이미지</th>
                <th>상품명</th>
                <th>판매가</th>
                <th>설정</th>
            </tr>
        </thead>
        <tbody id="product-tbody">
            <tr>
                <td colspan="5" style="text-align:center;">데이터를 불러오는 중입니다...</td>
            </tr>
        </tbody>
    </table>

    <script>
        async function fetchProducts() {
            try {
                // 서버에서 실제 JSON 데이터를 가져옴 
                const response = await fetch('/api/products');
                const data = await response.json();

                const tbody = document.getElementById('product-tbody');
                tbody.innerHTML = ''; // 로딩 문구 삭제

                // 가져온 상품들을 리스트로 출력 
                data.products.forEach(item => {
                    const row = `
                        <tr>
                            <td>${item.product_no}</td>
                            <td><img src="${item.tiny_image}" class="product-img"></td>
                            <td><strong>${item.product_name}</strong></td>
                            <td>${Number(item.price).toLocaleString()}원</td>
                            <td><button class="btn-setup" onclick="setupMatch('${item.product_no}', '${item.product_name}')">매칭설정</button></td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (error) {
                document.getElementById('product-tbody').innerHTML = 
                    '<tr><td colspan="5" style="color:red; text-align:center;">데이터 로드 실패 (토큰 만료 확인)</td></tr>';
            }
        }

        function setupMatch(no, name) {
            alert('[' + no + '] ' + name + '\n상품의 발볼/발등 매칭 설정을 시작합니다.');
        }

        // 페이지 시작 시 데이터 호출
        fetchProducts();
    </script>
</body>
</html>
